name: Build and Update Helm

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  # Hardcoding the lowercase name fixes the uppercase Docker error
  IMAGE_NAME: ghcr.io/rowk23/quarkus-ops

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 1. Build the Java application natively first
      - name: Build Quarkus App (Maven)
        run: ./mvnw clean package

      # 2. Log into GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build and push using the default Quarkus Dockerfile
      - name: Build and Push Docker Image
        run: |
          docker build -f src/main/docker/Dockerfile.jvm -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # 4. Update the Helm chart in the correct quarkus-ops folder
      - name: Update Helm values.yaml
        run: |
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' helm/quarkus-ops/values.yaml

      # 5. Commit the new tag back to Git
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add helm/quarkus-ops/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}"
          git push