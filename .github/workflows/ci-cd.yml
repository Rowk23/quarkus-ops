name: Build and Update Helm

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build app and image using Quarkus Jib extension
      - name: Build and Push Docker Image
        run: |
          ./mvnw clean package -Dquarkus.container-image.build=true \
          -Dquarkus.container-image.push=true \
          -Dquarkus.container-image.registry=${{ env.REGISTRY }} \
          -Dquarkus.container-image.group=${{ github.actor }} \
          -Dquarkus.container-image.name=quarkus-demo \
          -Dquarkus.container-image.tag=${{ github.sha }}

      # Update the Helm chart with the new image tag (the Git Commit SHA)
      - name: Update Helm values.yaml
        run: |
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' helm/quarkus-demo/values.yaml

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add helm/quarkus-demo/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}"
          git push