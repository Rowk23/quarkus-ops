apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quarkus-demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Rowk23/quarkus-ops.git'
    targetRevision: HEAD
    path: helm/quarkus-ops
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true